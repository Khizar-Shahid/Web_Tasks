<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 7 — Task 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0c0c0f;
      --bg-card: #16161c;
      --accent: #7c3aed;
      --accent-soft: rgba(124, 58, 237, 0.15);
      --accent-glow: rgba(124, 58, 237, 0.4);
      --text: #f4f4f8;
      --text-muted: #9898a4;
      --border: rgba(255, 255, 255, 0.06);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Ambient gradient orbs */
    .bg-gradient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(124, 58, 237, 0.25), transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(59, 130, 246, 0.12), transparent 50%),
        radial-gradient(ellipse 50% 30% at 50% 50%, rgba(124, 58, 237, 0.06), transparent 60%);
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-block;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 0.4rem 0.85rem;
      border-radius: 999px;
      border: 1px solid rgba(124, 58, 237, 0.25);
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 420px;
      margin: 0 auto;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 24px 48px -12px rgba(0, 0, 0, 0.5);
    }

    .card + .card {
      margin-top: 1.25rem;
    }

    .card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }

    .input-group {
      margin-bottom: 1.25rem;
    }

    .input-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: var(--text-muted);
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--text-muted);
      opacity: 0.8;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--accent) 0%, #5b21b6 100%);
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.85rem 1.5rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .btn:active {
      transform: translateY(0);
    }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>
  <div class="wrap">
    <header>
      <span class="badge">Lab 7 · Task 1</span>
      <h1>Welcome</h1>
      <p class="subtitle">Clean layout, dark theme, and focused typography. Adjust the form below to match your assignment.</p>
    </header>

    <section class="card">
      <h2>Form</h2>
      <form action="#" method="post" id="task1-form">
        <div class="input-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name" />
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="input-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Write something…"></textarea>
        </div>
        <button type="submit" class="btn">Submit</button>
      </form>
    </section>

    <footer>Lab 7 — Task 1</footer>
  </div>
</body>
</html>
