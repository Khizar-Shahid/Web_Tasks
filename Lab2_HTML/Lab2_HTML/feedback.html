<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Portal</title>
</head>
<body>

<header>
    <h1>Student Feedback Portal</h1>
    <p>Submit feedback for your courses</p>
    <img src="images/logo.png" alt="University Logo" width="150">
</header>

<main>
    <form action="feedback-received.html" method="POST">

        <label>Student Name:</label><br>
        <input type="text" name="name"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Course:</label><br>
        <select name="course">
            <option>Web Development</option>
            <option>Data Science</option>
            <option>Artificial Intelligence</option>
        </select><br><br>

        <label>Rating:</label><br>
        <input type="radio" name="rating" value="1">1
        <input type="radio" name="rating" value="2">2
        <input type="radio" name="rating" value="3">3
        <input type="radio" name="rating" value="4">4
        <input type="radio" name="rating" value="5">5
        <br><br>

        <label>Comments:</label><br>
        <textarea name="comments" rows="5" cols="30"></textarea><br><br>

        <input type="submit" value="Submit Feedback">
    </form>
</main>

<footer>
    <p>Email us at <a href="mailto:feedback@university.edu.pk">feedback@university.edu</a></p>
    <p>&copy; 2026 University</p>
</footer>

</body>
</html>
