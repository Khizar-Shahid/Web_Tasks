<!DOCTYPE html>
<html>
<head>
<title>Task 5 - Counter</title>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.22), transparent 55%),
    radial-gradient(circle at 100% 100%, rgba(147, 51, 234, 0.25), transparent 55%),
    #020617;
  color: #e5e7eb;
}

.counter-card {
  min-width: 260px;
  padding: 24px 26px 22px;
  border-radius: 18px;
  background: rgba(15, 23, 42, 0.9);
  box-shadow: 0 20px 50px rgba(15, 23, 42, 0.95);
  border: 1px solid rgba(148, 163, 184, 0.55);
  text-align: center;
  backdrop-filter: blur(14px);
}

.counter-label {
  font-size: 0.85rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #9ca3af;
  margin-bottom: 6px;
}

.count-display {
  font-size: 3rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  margin: 0 0 14px;
}

.buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.btn {
  min-width: 80px;
  padding: 8px 10px;
  border-radius: 999px;
  border: none;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  color: #f9fafb;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  box-shadow: 0 10px 24px rgba(15, 23, 42, 0.95);
  transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
}

.btn span.icon {
  font-size: 1rem;
}

.btn.inc {
  background: linear-gradient(135deg, #22c55e, #16a34a);
}

.btn.dec {
  background: linear-gradient(135deg, #ef4444, #b91c1c);
}

.btn.reset {
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
}

.btn:hover {
  transform: translateY(-1px);
  filter: brightness(1.05);
  box-shadow: 0 14px 30px rgba(15, 23, 42, 1);
}

.btn:active {
  transform: translateY(1px) scale(0.97);
  box-shadow: 0 7px 18px rgba(15, 23, 42, 1);
}
</style>
</head>

<body>
<div class="counter-card">
  <div class="counter-label">Counter</div>
  <h2 id="count" class="count-display">0</h2>
  <div class="buttons">
    <button class="btn dec" onclick="dec()">
      <span class="icon">−</span>
      <span>Dec</span>
    </button>
    <button class="btn reset" onclick="reset()">
      <span class="icon">⟳</span>
      <span>Reset</span>
    </button>
    <button class="btn inc" onclick="inc()">
      <span class="icon">＋</span>
      <span>Inc</span>
    </button>
  </div>
</div>

<script>
let c = 0;
function inc() { count.innerText = ++c; }
function dec() { count.innerText = --c; }
function reset() { c = 0; count.innerText = c; }
</script>
</body>
</html>
