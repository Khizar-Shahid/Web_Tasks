<!DOCTYPE html>
<html>
<head>
<title>Task 4 - Todo</title>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.2), transparent 55%),
    radial-gradient(circle at 100% 100%, rgba(147, 51, 234, 0.25), transparent 55%),
    #020617;
  color: #e5e7eb;
}

.app {
  width: 100%;
  max-width: 420px;
  padding: 24px 22px 20px;
  border-radius: 18px;
  background: rgba(15, 23, 42, 0.9);
  border: 1px solid rgba(148, 163, 184, 0.5);
  box-shadow: 0 22px 55px rgba(15, 23, 42, 0.9);
  backdrop-filter: blur(14px);
}

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.title {
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: 0.04em;
}

.badge {
  font-size: 0.78rem;
  padding: 4px 9px;
  border-radius: 999px;
  background: rgba(37, 99, 235, 0.2);
  border: 1px solid rgba(129, 140, 248, 0.8);
}

.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

input#task {
  flex: 1;
  padding: 9px 11px;
  border-radius: 999px;
  border: 1px solid rgba(148, 163, 184, 0.7);
  background: rgba(15, 23, 42, 0.8);
  color: #e5e7eb;
  outline: none;
  font-size: 0.9rem;
  transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
}

input#task::placeholder {
  color: #6b7280;
}

input#task:focus {
  border-color: #38bdf8;
  background: rgba(15, 23, 42, 0.95);
  box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.6);
}

button.add-btn {
  padding: 9px 14px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: #f9fafb;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 12px 25px rgba(22, 163, 74, 0.7);
  display: flex;
  align-items: center;
  gap: 4px;
  transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
}

button.add-btn:hover {
  transform: translateY(-1px);
  filter: brightness(1.05);
  box-shadow: 0 16px 30px rgba(22, 163, 74, 0.9);
}

button.add-btn:active {
  transform: translateY(1px) scale(0.97);
  box-shadow: 0 7px 16px rgba(15, 23, 42, 1);
}

ul#list {
  list-style: none;
  padding: 0;
  margin: 6px 0 0;
  max-height: 260px;
  overflow-y: auto;
}

li {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 9px 11px;
  margin: 6px 0;
  background: rgba(15, 23, 42, 0.9);
  border-radius: 11px;
  border: 1px solid rgba(55, 65, 81, 0.9);
  box-shadow: 0 7px 18px rgba(15, 23, 42, 0.9);
  font-size: 0.9rem;
}

li span {
  flex: 1;
  word-break: break-word;
}

li button {
  margin-left: 0;
  border-radius: 999px;
  border: none;
  background: rgba(239, 68, 68, 0.18);
  color: #fecaca;
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.15s ease;
}

li button:hover {
  background: rgba(239, 68, 68, 0.35);
  transform: translateY(-1px);
}

li button:active {
  transform: translateY(1px) scale(0.96);
}
</style>
</head>

<body>
<div class="app">
  <div class="app-header">
    <div class="title">Quick Todo</div>
    <div class="badge" id="countBadge">0 tasks</div>
  </div>
  <div class="input-row">
    <input id="task" placeholder="Add a new task and press Enter">
    <button class="add-btn" onclick="add()">
      <span>＋</span>
      <span>Add</span>
    </button>
  </div>
  <ul id="list"></ul>
</div>

<script>
function updateCount() {
  const countBadge = document.getElementById("countBadge");
  const count = document.querySelectorAll("#list li").length;
  countBadge.textContent = count === 1 ? "1 task" : count + " tasks";
}

function add() {
  const input = document.getElementById("task");
  const text = input.value.trim();
  if (text === "") return;

  const li = document.createElement("li");
  const span = document.createElement("span");
  span.textContent = text;

  const btn = document.createElement("button");
  btn.textContent = "×";
  btn.onclick = function () {
    li.remove();
    updateCount();
  };

  li.appendChild(span);
  li.appendChild(btn);
  document.getElementById("list").appendChild(li);

  input.value = "";
  input.focus();
  updateCount();
}

document.getElementById("task").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    add();
  }
});
</script>
</body>
</html>
